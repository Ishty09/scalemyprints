name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-workers:
    name: Deploy workers to Hetzner
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    # Skip deploy if commit message contains [skip deploy]
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add Hetzner host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "cd /opt/scalemyprints && bash infra/scripts/deploy.sh"

      - name: Notify success
        if: success()
        run: echo "✓ Deploy succeeded for commit ${{ github.sha }}"

  # Web is auto-deployed by Cloudflare Pages on push — this job just notifies
  notify-web:
    name: Cloudflare Pages auto-deploys web
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Cloudflare Pages auto-builds and deploys apps/web on push to main."
          echo "Monitor at https://dash.cloudflare.com"
