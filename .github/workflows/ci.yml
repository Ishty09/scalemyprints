name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workers:
    name: Python workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/workers/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: apps/workers
        run: |
          uv pip install --system \
            "fastapi>=0.110.0" "uvicorn[standard]>=0.29.0" \
            "pydantic>=2.6.4" "pydantic-settings>=2.2.1" \
            "httpx>=0.27.0" "tenacity>=8.2.3" \
            "supabase>=2.4.0" "cryptography>=42.0.5" \
            "python-jose[cryptography]>=3.3.0" "PyJWT>=2.8.0" \
            "cachetools>=5.3.3" "sentry-sdk[fastapi]>=1.44.0" \
            "structlog>=24.1.0" "openai>=1.14.2" "orjson>=3.10.0" \
            "python-dateutil>=2.9.0" \
            "pytest>=8.1.1" "pytest-asyncio>=0.23.5" "pytest-cov>=4.1.0" \
            "respx>=0.21.0" "freezegun>=1.4.0" \
            "ruff>=0.3.4" "mypy>=1.9.0"

      - name: Lint with ruff
        working-directory: apps/workers
        run: ruff check src tests

      - name: Format check with ruff
        working-directory: apps/workers
        run: ruff format --check src tests

      - name: Type check with mypy
        working-directory: apps/workers
        run: mypy src
        continue-on-error: true  # warn on type drift but don't block

      - name: Run tests with coverage
        working-directory: apps/workers
        env:
          PYTHONPATH: src
          ENVIRONMENT: test
          MASTER_ENCRYPTION_KEY: ${{ '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef' }}
          INTERNAL_API_SECRET: ${{ 'fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210' }}
          OPENAI_API_KEY: sk-test
          SUPABASE_JWT_SECRET: test-secret
        run: pytest --cov=scalemyprints --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-workers
          path: apps/workers/coverage.xml

  web:
    name: Next.js web
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Type-check contracts
        run: pnpm --filter @scalemyprints/contracts type-check

      - name: Type-check utils
        run: pnpm --filter @scalemyprints/utils type-check

      - name: Type-check web
        run: pnpm --filter @scalemyprints/web type-check

      - name: Lint web
        run: pnpm --filter @scalemyprints/web lint
        continue-on-error: true  # warn but don't block initial setup

      - name: Build web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key-for-build
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm --filter @scalemyprints/web build

  extension:
    name: Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Type-check
        run: pnpm --filter @scalemyprints/extension type-check

      - name: Build
        run: pnpm --filter @scalemyprints/extension build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: apps/extension/dist
