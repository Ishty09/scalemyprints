# =============================================================================
# Local development stack
# =============================================================================
# Brings up:
#   - workers (FastAPI on :8000)
#   - redis   (for future Phase B cache)
#
# Usage:
#   docker compose -f infra/docker/docker-compose.yml up
# =============================================================================

services:
  workers:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.workers
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/workers/.env
    environment:
      - ENVIRONMENT=development
      - WORKER_LOG_LEVEL=DEBUG
      - REDIS_URL=redis://redis:6379/0
      - WORKER_CORS_ORIGINS=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
